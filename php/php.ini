; =========================================
; PHP.ini for Electron打包專案
; 路徑：D:\PHP_developer\gadget\dist\win-unpacked\resources\php\php.ini
; =========================================

[PHP]

; -----------------------------------------
; 基本設定
; -----------------------------------------
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; PHP 路徑與擴充套件
extension_dir = "./ext"

; 常用擴充套件
extension=fileinfo
extension=mbstring
extension=openssl
extension=pdo_sqlite
extension=sqlite3
extension=curl
extension=json
extension=tokenizer
extension=xml

; -----------------------------------------
; 時區
; -----------------------------------------
date.timezone = "Asia/Taipei"

; -----------------------------------------
; 開發模式推薦
; -----------------------------------------
output_buffering = On
max_input_time = 600
max_execution_time = 600
upload_max_filesize = 500M
post_max_size = 500M
memory_limit = 1024M

; -----------------------------------------
; 可選：設定 path
; -----------------------------------------
; include_path = ".;D:\PHP_developer\gadget\dist\win-unpacked\resources\php\pear"
